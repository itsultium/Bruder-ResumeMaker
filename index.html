<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRM — Bruder Resume Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0C1B2E;--s1:#132336;--s2:#1A3050;--bd:#1E3A5A;
  --acc:#4DA6FF;--txt:#E8F0F8;--mut:#7A9BBE;
  --ok:#34C77B;--err:#FF5E6C;--r:10px;--t:0.16s ease;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;font-size:14px;line-height:1.5;}
a{color:var(--acc);}
button{font-family:'Inter',sans-serif;}

/* HEADER */
.hd{display:flex;align-items:center;justify-content:space-between;padding:11px 22px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;flex-shrink:0;}
.logo{font-size:17px;font-weight:800;letter-spacing:-0.4px;}
.logo span{color:var(--acc);}
.hd-btns{display:flex;gap:7px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border:none;border-radius:7px;font:600 12px 'Inter',sans-serif;cursor:pointer;transition:all var(--t);white-space:nowrap;}
.bp{background:var(--acc);color:#0C1B2E;}
.bp:hover{background:#6DB8FF;}
.bs{background:var(--s2);color:var(--txt);border:1px solid var(--bd);}
.bs:hover{background:var(--bd);}
.bg{background:transparent;color:var(--mut);border:1px solid var(--bd);}
.bg:hover{color:var(--txt);border-color:var(--acc);}
.bdanger{background:transparent;color:var(--mut);border:1px solid var(--bd);}
.bdanger:hover{color:var(--err);border-color:var(--err);}
.btn:disabled{opacity:0.4;cursor:not-allowed;pointer-events:none;}

/* LAYOUT */
.main{display:flex;flex:1;min-height:0;height:calc(100vh - 47px);}

/* FORM PANEL */
.fp{width:430px;min-width:360px;display:flex;flex-direction:column;border-right:1px solid var(--bd);}

/* Steps bar */
.stbar{display:flex;align-items:center;padding:13px 18px 19px;background:var(--s1);border-bottom:1px solid var(--bd);gap:0;overflow-x:auto;flex-shrink:0;}
.stbar::-webkit-scrollbar{display:none;}
.sti{display:flex;align-items:center;flex-shrink:0;}
.std{width:25px;height:25px;border-radius:50%;background:var(--s2);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--mut);cursor:pointer;transition:all var(--t);position:relative;flex-shrink:0;}
.std.active{background:var(--acc);border-color:var(--acc);color:#0C1B2E;}
.std.done{background:var(--ok);border-color:var(--ok);color:#fff;}
.stlbl{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:8.5px;color:var(--mut);font-weight:500;}
.std.active .stlbl{color:var(--acc);}
.std.done .stlbl{color:var(--ok);}
.stcon{width:22px;height:2px;background:var(--bd);flex-shrink:0;margin:0 2px;}
.stcon.done{background:var(--ok);}

/* Form content */
.fc{flex:1;overflow-y:auto;padding:22px 18px;}
.fc::-webkit-scrollbar{width:4px;}
.fc::-webkit-scrollbar-track{background:transparent;}
.fc::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
.sth{margin-bottom:20px;}
.stt{font-size:17px;font-weight:700;}
.sts{font-size:12px;color:var(--mut);margin-top:3px;}
.fg{margin-bottom:13px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
label{display:block;font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.req{color:var(--err);margin-left:2px;}
input,textarea,select{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:7px;padding:9px 12px;color:var(--txt);font:400 13px 'Inter',sans-serif;transition:border-color var(--t),background var(--t);outline:none;}
input:focus,textarea:focus{border-color:var(--acc);background:var(--s2);}
input::placeholder,textarea::placeholder{color:var(--mut);}
textarea{resize:vertical;min-height:88px;line-height:1.6;}
.ckr{display:flex;align-items:center;gap:8px;margin-top:7px;}
.ckr input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--acc);padding:0;border-radius:3px;flex-shrink:0;}
.ckr label{margin:0;font-size:12px;text-transform:none;letter-spacing:0;color:var(--txt);cursor:pointer;font-weight:400;}

/* Card */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px 15px;margin-bottom:11px;}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.cn{font-size:12px;font-weight:600;color:var(--txt);}
.rb{background:none;border:none;cursor:pointer;color:var(--mut);font-size:18px;line-height:1;padding:1px 3px;border-radius:4px;transition:color var(--t);}
.rb:hover{color:var(--err);}

/* Bullets */
.blist{display:flex;flex-direction:column;gap:7px;margin-top:7px;}
.brow{display:flex;align-items:flex-start;gap:6px;}
.bwrap{flex:1;position:relative;}
.bwrap textarea{min-height:52px;padding-right:30px;font-size:12px;}
.aibtn{position:absolute;right:7px;top:7px;background:none;border:none;cursor:pointer;color:var(--mut);font-size:13px;padding:2px;border-radius:4px;transition:color var(--t);line-height:1;}
.aibtn:hover{color:var(--acc);}
.rbb{background:none;border:none;cursor:pointer;color:var(--mut);font-size:17px;padding:6px 2px;line-height:1;transition:color var(--t);flex-shrink:0;}
.rbb:hover{color:var(--err);}

/* Skills */
.skwrap{display:flex;flex-wrap:wrap;gap:7px;}
.skchip{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:500;}
.skchip button{background:none;border:none;color:var(--mut);cursor:pointer;font-size:15px;line-height:1;padding:0;transition:color var(--t);}
.skchip button:hover{color:var(--err);}
.skirow{display:flex;gap:7px;margin-top:9px;}
.skirow input{flex:1;}

/* Add row button */
.addrow{width:100%;padding:9px;border:1px dashed var(--bd);border-radius:var(--r);background:none;color:var(--mut);font:500 12px 'Inter',sans-serif;cursor:pointer;transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:6px;}
.addrow:hover{border-color:var(--acc);color:var(--acc);background:rgba(77,166,255,0.04);}
.air{display:flex;justify-content:flex-end;margin-top:6px;}
.tipbox{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px;margin-top:15px;}
.tiptit{font-size:10.5px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;}
.tipbox ul{font-size:11.5px;color:var(--mut);padding-left:16px;line-height:2;}
.empty{text-align:center;padding:28px 14px;color:var(--mut);}
.emico{font-size:26px;margin-bottom:9px;}
.empty p{font-size:12px;line-height:1.6;}
.fingrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:15px;margin-bottom:15px;}
.filbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:0.5px;}
.fival{font-size:13px;font-weight:600;margin-top:2px;}

/* Form nav */
.fnav{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-top:1px solid var(--bd);background:var(--s1);flex-shrink:0;}
.fnct{font-size:11px;color:var(--mut);}

/* PREVIEW PANEL */
.pp{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#091521;}
.ptb{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--s1);border-bottom:1px solid var(--bd);gap:11px;flex-shrink:0;}
.ttabs{display:flex;gap:5px;}
.ttab{padding:5px 13px;border-radius:6px;font:600 11.5px 'Inter',sans-serif;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--mut);transition:all var(--t);}
.ttab.on{background:var(--acc);border-color:var(--acc);color:#0C1B2E;}
.clrwrap{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--mut);}
input[type=color]{width:24px;height:24px;border:2px solid var(--bd);border-radius:50%;padding:2px;cursor:pointer;background:none;transition:border-color var(--t);}
input[type=color]:hover{border-color:var(--acc);}
.pw{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px;display:flex;justify-content:center;align-items:flex-start;}
.pw::-webkit-scrollbar{width:6px;}
.pw::-webkit-scrollbar-track{background:transparent;}
.pw::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}
#pscaler{position:relative;flex-shrink:0;}
#rdoc{width:794px;position:absolute;top:0;left:0;transform-origin:top left;box-shadow:0 6px 44px rgba(0,0,0,0.55);}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(9,21,33,0.88);display:none;align-items:center;justify-content:center;z-index:300;}
.ov.show{display:flex;}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:26px;width:410px;max-width:90vw;}
.modal-t{font-size:16px;font-weight:700;margin-bottom:4px;}
.modal-s{font-size:12px;color:var(--mut);margin-bottom:18px;line-height:1.6;}
.modal-act{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* LOADING */
.lov{position:fixed;inset:0;background:rgba(9,21,33,0.82);display:none;align-items:center;justify-content:center;z-index:400;}
.lov.show{display:flex;}
.lbox{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:26px 34px;text-align:center;}
.spin{width:34px;height:34px;border:3px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 13px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:10px 15px;font-size:12.5px;font-weight:500;z-index:500;transform:translateY(60px);opacity:0;transition:all .22s ease;max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:var(--ok);}
.toast.err{border-color:var(--err);}

/* TEMPLATE: MODERN (DARK) */
.rm{width:794px;min-height:1123px;display:flex;font-family:'Inter',Arial,sans-serif;background:#0D1B2A;}
.rm-side{width:228px;flex-shrink:0;background:#182D47;padding:30px 19px;}
.rm-body{flex:1;padding:30px 24px;background:#0D1B2A;}
.rm-name{font-size:23px;font-weight:800;color:#fff;line-height:1.1;word-break:break-word;}
.rm-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.3px;margin:7px 0 17px;}
.rm-slbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;margin-bottom:9px;}
.rm-citem{display:flex;align-items:flex-start;gap:7px;margin-bottom:8px;font-size:10px;color:#9AB5C8;word-break:break-word;line-height:1.4;}
.rm-ci{font-size:11px;flex-shrink:0;margin-top:1px;}
.rm-div{height:1px;margin:13px 0;}
.rm-sk{margin-bottom:8px;}
.rm-skname{font-size:10.5px;color:#C0D4E4;}
.rm-sec{margin-bottom:20px;}
.rm-sectit{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding-bottom:6px;margin-bottom:11px;border-bottom-width:1px;border-bottom-style:solid;}
.rm-sum{font-size:11px;color:#9AB5C8;line-height:1.75;}
.rm-exp{margin-bottom:15px;}
.rm-exptop{display:flex;justify-content:space-between;align-items:flex-start;}
.rm-expco{font-size:12px;font-weight:700;color:#fff;}
.rm-expdt{font-size:9px;font-weight:600;flex-shrink:0;margin-left:6px;margin-top:1px;}
.rm-exprole{font-size:10px;font-weight:600;margin:2px 0 7px;}
.rm-blist{list-style:none;}
.rm-bitem{display:flex;align-items:flex-start;gap:6px;font-size:10px;color:#8BA5BA;line-height:1.65;margin-bottom:4px;}
.rm-bdot{width:4px;height:4px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.rm-edu{margin-bottom:11px;}
.rm-edusch{font-size:11.5px;font-weight:700;color:#fff;}
.rm-edudeg{font-size:10px;color:#8BA5BA;margin-top:2px;}
.rm-edudt{font-size:9px;margin-top:2px;}

/* TEMPLATE: CLASSIC (WHITE) */
.rc{width:794px;min-height:1123px;font-family:'Inter',Arial,sans-serif;background:#fff;padding:46px 50px;color:#1C1C2E;}
.rc-name{font-size:29px;font-weight:800;letter-spacing:-.8px;line-height:1;margin-bottom:4px;}
.rc-title{font-size:13px;font-weight:500;color:#555;margin-bottom:9px;}
.rc-cts{display:flex;flex-wrap:wrap;font-size:10.5px;color:#666;}
.rc-sep{margin:0 6px;color:#CCC;}
.rc-div{height:2px;margin:13px 0 16px;}
.rc-thin{height:1px;background:#EBEBEB;margin:7px 0 13px;}
.rc-sec{margin-bottom:19px;}
.rc-sectit{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:2px;}
.rc-sum{font-size:11.5px;color:#444;line-height:1.75;}
.rc-exp{margin-bottom:13px;}
.rc-exptop{display:flex;justify-content:space-between;align-items:baseline;}
.rc-expco{font-size:12.5px;font-weight:700;}
.rc-expdt{font-size:10.5px;color:#777;flex-shrink:0;}
.rc-exprole{font-size:11.5px;font-weight:500;color:#555;margin:2px 0 5px;}
.rc-blist{list-style:none;}
.rc-bitem{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:#444;line-height:1.65;margin-bottom:4px;}
.rc-bdot{width:4px;height:4px;border-radius:50%;margin-top:7px;flex-shrink:0;}
.rc-edu{margin-bottom:10px;}
.rc-edutop{display:flex;justify-content:space-between;}
.rc-edusch{font-size:12.5px;font-weight:700;}
.rc-edudt{font-size:10.5px;color:#777;}
.rc-edudeg{font-size:11px;color:#555;margin-top:2px;}
.rc-skwrap{display:flex;flex-wrap:wrap;gap:6px;}
.rc-sk{padding:4px 11px;border-radius:20px;font-size:10.5px;font-weight:500;}
.rc-bot{display:grid;gap:26px;}

@media(max-width:820px){
  .main{flex-direction:column;height:auto;min-height:calc(100vh - 47px);}
  .fp{width:100%;min-width:0;height:58vh;border-right:none;border-bottom:1px solid var(--bd);}
  .pp{height:380px;}
}
</style>
</head>
<body>

<header class="hd">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="logo">BRM<span>.</span></div>
    <div style="font-size:10px;font-weight:600;color:var(--mut);letter-spacing:1px;padding-left:10px;border-left:1px solid var(--bd);">Bruder Resume Maker</div>
  </div>
  <div class="hd-btns">
    <button class="btn bg" id="importBtn">↑ Import</button>
    <button class="btn bg" id="exportBtn">↓ Save</button>
    <button class="btn bg" id="settingsBtn">⚙ AI Key</button>
    <button class="btn bp" id="dlBtn">↓ PDF</button>
  </div>
</header>

<div class="main">
  <div class="fp">
    <div class="stbar" id="stbar"></div>
    <div class="fc" id="fc"></div>
    <div class="fnav">
      <button class="btn bs" id="prevBtn">← Back</button>
      <span class="fnct" id="fnct"></span>
      <button class="btn bp" id="nextBtn">Next →</button>
    </div>
  </div>
  <div class="pp">
    <div class="ptb">
      <div class="ttabs">
        <button class="ttab on" data-tpl="modern">Modern</button>
        <button class="ttab" data-tpl="classic">Classic</button>
      </div>
      <div class="clrwrap">
        <span>Accent</span>
        <input type="color" id="clrpick" value="#4DA6FF" title="Accent color">
      </div>
    </div>
    <div class="pw" id="pw">
      <div id="pscaler"><div id="rdoc"></div></div>
    </div>
  </div>
</div>

<div class="lov" id="lov">
  <div class="lbox">
    <div class="spin"></div>
    <div style="font-size:13px;font-weight:600;">Enhancing with AI...</div>
    <div style="font-size:11px;color:var(--mut);margin-top:4px;">Rewriting for impact</div>
  </div>
</div>

<div class="ov" id="setov">
  <div class="modal">
    <div class="modal-t">AI Settings</div>
    <div class="modal-s">Enter your Anthropic API key to unlock AI-powered enhancements. Your key is stored only in your browser and sent directly to Anthropic — never anywhere else.</div>
    <div class="fg">
      <label>Anthropic API Key</label>
      <input type="password" id="apifld" placeholder="sk-ant-..." spellcheck="false" autocomplete="off">
    </div>
    <div style="font-size:11px;color:var(--mut);margin-top:-6px;">
      Get yours at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </div>
    <div class="modal-act">
      <button class="btn bs" id="cancelSet">Cancel</button>
      <button class="btn bp" id="saveSet">Save Key</button>
    </div>
  </div>
</div>

<div class="toast" id="tst"></div>
<input type="file" id="filein" accept=".json" style="display:none">

<script>
/* ================================================================
   STATE
================================================================ */
const SKEY = 'brm_v1';
const AKEY = 'brm_key';

function fresh() {
  return {
    personal: { firstName:'', lastName:'', title:'', email:'', phone:'', location:'', website:'', linkedin:'' },
    summary: '',
    experience: [],
    education: [],
    skills: []
  };
}
function uid() { return Math.random().toString(36).slice(2,9); }

let S = {
  step: 0, tpl: 'modern', acc: '#4DA6FF',
  apiKey: localStorage.getItem(AKEY) || '',
  data: (() => { try { const r=localStorage.getItem(SKEY); return r?JSON.parse(r):fresh(); } catch { return fresh(); } })()
};

function save() { localStorage.setItem(SKEY, JSON.stringify(S.data)); }

/* ================================================================
   UTILITIES
================================================================ */
function h(v) {
  if (v==null) return '';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type='ok') {
  const el=document.getElementById('tst');
  el.textContent=(type==='ok'?'✓  ':'✗  ')+msg;
  el.className='toast show '+type;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.className='toast',3200);
}
function setLoad(v) { document.getElementById('lov').classList.toggle('show',v); }

/* ================================================================
   STEPS
================================================================ */
const STEPS=[
  {id:'personal',   lbl:'Info'},
  {id:'summary',    lbl:'Summary'},
  {id:'experience', lbl:'Experience'},
  {id:'education',  lbl:'Education'},
  {id:'skills',     lbl:'Skills'},
  {id:'finish',     lbl:'Finish'},
];

function renderSteps() {
  document.getElementById('stbar').innerHTML=STEPS.map((s,i)=>{
    const cls=i<S.step?'done':i===S.step?'active':'';
    const inner=i<S.step?'&#10003;':i+1;
    return `<div class="sti">
      <div class="std ${cls}" data-si="${i}" title="${s.lbl}">${inner}<span class="stlbl">${s.lbl}</span></div>
      ${i<STEPS.length-1?`<div class="stcon ${i<S.step?'done':''}"></div>`:''}
    </div>`;
  }).join('');
  document.querySelectorAll('.std[data-si]').forEach(el=>{
    el.addEventListener('click',()=>{ const i=+el.dataset.si; if(i<=S.step){S.step=i;renderAll();} });
  });
}

/* ================================================================
   FORM — STEP BUILDERS
================================================================ */
function renderForm() {
  const id=STEPS[S.step].id;
  document.getElementById('fc').innerHTML=stepHTML[id]();
  document.getElementById('prevBtn').disabled=S.step===0;
  document.getElementById('nextBtn').textContent=S.step===STEPS.length-1?'Finish ✓':'Next →';
  document.getElementById('fnct').textContent=`${S.step+1} / ${STEPS.length}`;
  bindEvents();
}

const stepHTML = {

/* --- Personal --- */
personal() {
  const p=S.data.personal;
  return `<div class="sth"><div class="stt">Personal Information</div><div class="sts">Shown at the top of your resume</div></div>
<div class="fr">
  <div class="fg"><label>First Name <span class="req">*</span></label>
    <input type="text" data-p="firstName" value="${h(p.firstName)}" placeholder="Bruder" spellcheck="true" autocomplete="given-name"></div>
  <div class="fg"><label>Last Name <span class="req">*</span></label>
    <input type="text" data-p="lastName" value="${h(p.lastName)}" placeholder="Motion" spellcheck="true" autocomplete="family-name"></div>
</div>
<div class="fg"><label>Job Title <span class="req">*</span></label>
  <input type="text" data-p="title" value="${h(p.title)}" placeholder="e.g. Video Editor &amp; Motion Designer" spellcheck="true"></div>
<div class="fr">
  <div class="fg"><label>Email</label>
    <input type="email" data-p="email" value="${h(p.email)}" placeholder="you@email.com" autocomplete="email"></div>
  <div class="fg"><label>Phone</label>

/* ================================================================
   BIND EVENTS
================================================================ */
function bindEvents() {
  /* Personal */
  document.querySelectorAll('[data-p]').forEach(el=>{
    el.addEventListener('input',e=>{
      S.data.personal[e.target.dataset.p]=e.target.value;
      save(); renderPreview();
    });
  });

  /* Summary */
  const sumTa=document.querySelector('[data-field="summary"]');
  if(sumTa) sumTa.addEventListener('input',e=>{S.data.summary=e.target.value;save();renderPreview();});

  const aiSumBtn=document.getElementById('aiSumBtn');
  if(aiSumBtn) aiSumBtn.addEventListener('click',async()=>{
    const r=await aiEnhanceSummary();
    if(r){S.data.summary=r;save();renderForm();renderPreview();toast('Summary enhanced');}
  });

  /* Experience fields */
  document.querySelectorAll('[data-ef]').forEach(el=>{
    el.addEventListener('input',e=>{
      const[eid,field]=e.target.dataset.ef.split('.');
      const exp=S.data.experience.find(x=>x.id===eid);
      if(!exp)return;
      exp[field]=e.target.value;
      save();renderPreview();
      const card=e.target.closest('.card');
      if(card){const n=card.querySelector('.cn');if(n)n.textContent=`${exp.role||'Role'} at ${exp.company||'Company'}`;}
    });
  });

  /* "Currently work here" */
  document.querySelectorAll('[data-ecur]').forEach(el=>{
    el.addEventListener('change',e=>{
      const eid=e.target.dataset.ecur;
      const exp=S.data.experience.find(x=>x.id===eid);
      if(!exp)return;
      exp.current=e.target.checked;
      const endEl=document.getElementById(`end_${eid}`);
      if(endEl){endEl.disabled=exp.current;endEl.value=exp.current?'Present':(exp.endDate||'');}
      save();renderPreview();
    });
  });

  /* Remove experience */
  document.querySelectorAll('[data-rexp]').forEach(el=>{
    el.addEventListener('click',e=>{
      S.data.experience=S.data.experience.filter(x=>x.id!==e.target.dataset.rexp);
      save();renderForm();renderPreview();
    });
  });

  /* Add experience */
  const addExpBtn=document.getElementById('addExpBtn');
  if(addExpBtn) addExpBtn.addEventListener('click',()=>{
    S.data.experience.push({id:uid(),company:'',role:'',startDate:'',endDate:'',current:false,bullets:['']});
    save();renderForm();renderPreview();
    setTimeout(()=>{const cs=document.querySelectorAll('.card[data-eid]');if(cs.length)cs[cs.length-1].scrollIntoView({behavior:'smooth',block:'start'});},60);
  });

  /* Bullet textarea */
  document.querySelectorAll('[data-bf]').forEach(el=>{
    el.addEventListener('input',e=>{
      const[eid,idx]=e.target.dataset.bf.split('.');
      const exp=S.data.experience.find(x=>x.id===eid);
      if(exp){exp.bullets[+idx]=e.target.value;save();renderPreview();}
    });
  });

  /* Add bullet */
  document.querySelectorAll('[data-addb]').forEach(el=>{
    el.addEventListener('click',e=>{
      const eid=e.target.dataset.addb;
      const exp=S.data.experience.find(x=>x.id===eid);
      if(exp){exp.bullets.push('');save();renderForm();renderPreview();
        setTimeout(()=>{const ts=document.querySelectorAll(`[data-bf^="${eid}."]`);if(ts.length)ts[ts.length-1].focus();},60);}
    });
  });

  /* Remove bullet */
  document.querySelectorAll('[data-rb]').forEach(el=>{
    el.addEventListener('click',e=>{
      const[eid,idx]=e.target.dataset.rb.split('.');
      const exp=S.data.experience.find(x=>x.id===eid);
      if(exp&&exp.bullets.length>1){exp.bullets.splice(+idx,1);save();renderForm();renderPreview();}
    });
  });

  /* AI enhance bullet */
  document.querySelectorAll('[data-aib]').forEach(btn=>{
    btn.addEventListener('click',async e=>{
      const[eid,idx]=e.target.dataset.aib.split('.');
      const exp=S.data.experience.find(x=>x.id===eid);
      if(!exp)return;
      const b=exp.bullets[+idx];
      if(!b.trim()){toast('Write something first, then enhance it','err');return;}
      const r=await aiEnhanceBullet(b,exp.role,exp.company);
      if(r){exp.bullets[+idx]=r;save();renderForm();renderPreview();toast('Bullet enhanced');}
    });
  });

  /* Education fields */
  document.querySelectorAll('[data-edf]').forEach(el=>{
    el.addEventListener('input',e=>{
      const[eid,field]=e.target.dataset.edf.split('.');
      const edu=S.data.education.find(x=>x.id===eid);
      if(!edu)return;
      edu[field]=e.target.value;save();renderPreview();
      const card=e.target.closest('.card');
      if(card){const n=card.querySelector('.cn');if(n)n.textContent=edu.institution||'Education';}
    });
  });

  /* Remove education */
  document.querySelectorAll('[data-redu]').forEach(el=>{
    el.addEventListener('click',e=>{
      S.data.education=S.data.education.filter(x=>x.id!==e.target.dataset.redu);
      save();renderForm();renderPreview();
    });
  });

  /* Add education */
  const addEduBtn=document.getElementById('addEduBtn');
  if(addEduBtn) addEduBtn.addEventListener('click',()=>{
    S.data.education.push({id:uid(),institution:'',degree:'',field:'',startDate:'',endDate:''});
    save();renderForm();renderPreview();
  });

  /* Skills */
  const skIn=document.getElementById('skIn');
  const addSkBtn=document.getElementById('addSkBtn');
  function doAddSkill(){
    if(!skIn)return;
    const val=skIn.value.trim();
    if(!val)return;
    if(S.data.skills.find(s=>s.name.toLowerCase()===val.toLowerCase())){toast('Skill already added','err');return;}
    S.data.skills.push({name:val});
    skIn.value='';save();renderForm();renderPreview();
    setTimeout(()=>document.getElementById('skIn')?.focus(),40);
  }
  if(skIn) skIn.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doAddSkill();}});
  if(addSkBtn) addSkBtn.addEventListener('click',doAddSkill);

  document.querySelectorAll('[data-rsk]').forEach(el=>{
    el.addEventListener('click',e=>{
      S.data.skills.splice(+e.target.dataset.rsk,1);
      save();renderForm();renderPreview();
    });
  });

  /* AI suggest skills */
  const aiSkBtn=document.getElementById('aiSkBtn');
  if(aiSkBtn) aiSkBtn.addEventListener('click',async()=>{
    const r=await aiSuggestSkills();
    if(r&&r.length){
      let added=0;
      r.forEach(name=>{
        if(!S.data.skills.find(s=>s.name.toLowerCase()===name.toLowerCase())){S.data.skills.push({name});added++;}
      });
      save();renderForm();renderPreview();
      toast(added?`Added ${added} skills`:'All suggestions already added');
    }
  });

  /* Finish step */
  const dlBtnStep=document.getElementById('dlBtnStep');
  if(dlBtnStep) dlBtnStep.addEventListener('click',downloadPDF);
  const saveBtnStep=document.getElementById('saveBtnStep');
  if(saveBtnStep) saveBtnStep.addEventListener('click',exportJSON);
  const clearBtn=document.getElementById('clearBtn');
  if(clearBtn) clearBtn.addEventListener('click',()=>{
    if(!confirm('Clear all data? This cannot be undone.'))return;
    S.data=fresh();save();S.step=0;renderAll();toast('Data cleared');
  });
}

================================================================ */
function renderPreview(){
  document.getElementById('rdoc').innerHTML=S.tpl==='modern'?tplModern():tplClassic();
  requestAnimationFrame(scalePreview);
}

function scalePreview(){
  const pw=document.getElementById('pw');
  const sc=document.getElementById('pscaler');
  const doc=document.getElementById('rdoc');
  if(!pw||!sc||!doc)return;
  /* Reset transform to measure true height */
  doc.style.transform='none';
  const avail=pw.clientWidth-44;
  if(avail<=0)return;
  const scale=Math.min(1,avail/794);
  const docH=Math.max(doc.scrollHeight,1123);
  doc.style.transform=`scale(${scale})`;
  doc.style.transformOrigin='top left';
  sc.style.width=`${Math.round(794*scale)}px`;
  sc.style.height=`${Math.round(docH*scale)}px`;
  sc.style.overflow='hidden';
  sc.style.flexShrink='0';
}
window.addEventListener('resize',scalePreview);

    <div class="rc-title" style="color:${acc};">${h(p.title)}</div>
    <div class="rc-cts">${ctRow}</div>
  </div>
  <div class="rc-div" style="background:${acc};"></div>
  ${d.summary?`<div class="rc-sec"><div class="rc-sectit" style="color:${acc};">Professional Summary</div><div class="rc-thin"></div><div class="rc-sum">${h(d.summary)}</div></div>`:''}
  ${d.experience.length?`<div class="rc-sec"><div class="rc-sectit" style="color:${acc};">Work Experience</div><div class="rc-thin"></div>${expHtml}</div>`:''}
  <div class="rc-bot" style="grid-template-columns:${hasBoth?'1fr 1fr':'1fr'};">
    ${d.education.length?`<div class="rc-sec"><div class="rc-sectit" style="color:${acc};">Education</div><div class="rc-thin"></div>${eduHtml}</div>`:''}
    ${d.skills.length?`<div class="rc-sec"><div class="rc-sectit" style="color:${acc};">Skills</div><div class="rc-thin"></div><div class="rc-skwrap">${skillsHtml}</div></div>`:''}
  </div>
</div>`;
}

/* ================================================================
   AI CALLS
================================================================ */
async function callAI(prompt){
  if(!S.apiKey){
    document.getElementById('setov').classList.add('show');
    toast('Enter your API key first','err');
    return null;
  }
  setLoad(true);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':S.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||`API error ${res.status}`);}
    const data=await res.json();
    return data.content?.[0]?.text?.trim()||null;
  }catch(err){toast(err.message||'AI request failed','err');return null;}
  finally{setLoad(false);}
}

async function aiEnhanceSummary(){
  const p=S.data.personal,cur=S.data.summary;
  return callAI(`You are an expert resume writer. ${cur?'Improve this professional summary:':'Write a professional summary for:'}

Role: ${p.title||'Professional'}
Name: ${[p.firstName,p.lastName].filter(Boolean).join(' ')||'Not specified'}
Experience: ${S.data.experience.map(e=>`${e.role} at ${e.company}`).filter(x=>x.trim()).join(', ')||'Not specified'}
${cur?`Current text: "${cur}"`:''}

Rules: 3 to 4 sentences max. Start with experience level and role. Mention 2 to 3 key strengths. End with value to employer. No first person. No cliches. Return only the summary text with no extra labels or quotes.`);
}

async function aiEnhanceBullet(text,role,company){
  return callAI(`You are an expert resume writer. Improve this job description bullet point.

Role: ${role||'Professional'}
Company: ${company||'A company'}
Bullet: "${text}"

Rules: Start with a strong past-tense action verb. Be specific and include measurable impact where possible. One concise sentence. No trailing period. Return only the improved bullet text, nothing else.`);
}

async function aiSuggestSkills(){
  const r=await callAI(`You are a resume expert. Suggest 8 relevant skills for this person.

Job Title: ${S.data.personal.title||'Not specified'}
Experience: ${S.data.experience.map(e=>`${e.role} at ${e.company}`).filter(x=>x.trim()).join(', ')||'Not specified'}
Already has: ${S.data.skills.map(s=>s.name).join(', ')||'None'}

Return ONLY a JSON array of skill name strings. No explanation. No markdown code fences. Example: ["Skill A","Skill B","Skill C"]`);
  if(!r)return null;
  try{return JSON.parse(r.replace(/```json|```/g,'').trim());}
  catch{toast('Could not parse skill suggestions','err');return null;}
}

/* ================================================================
   PDF DOWNLOAD
================================================================ */
async function downloadPDF(){
  const dlBtn=document.getElementById('dlBtn');
  const dlBtnStep=document.getElementById('dlBtnStep');
  const orig=dlBtn?.textContent;
  if(dlBtn)dlBtn.textContent='...';
  if(dlBtnStep)dlBtnStep.textContent='Generating...';

  const src=document.getElementById('rdoc');
  const clone=src.cloneNode(true);
  clone.style.cssText='transform:none;width:794px;position:static;';
  const holder=document.createElement('div');
  holder.style.cssText='position:fixed;left:-10000px;top:0;';
  holder.appendChild(clone);
  document.body.appendChild(holder);

  const fname=[S.data.personal.firstName,S.data.personal.lastName].filter(Boolean).join('_')||'Resume';
  try{
    await html2pdf().set({
      margin:0,
      filename:`${fname}_Resume.pdf`,
      image:{type:'jpeg',quality:0.98},
      html2canvas:{scale:2,useCORS:true,logging:false,width:794},
      jsPDF:{unit:'px',format:[794,1123],orientation:'portrait',hotfixes:['px_scaling']}
    }).from(clone).save();
    toast('PDF downloaded');
  }catch(err){toast('Download failed — try again','err');}
  finally{
    document.body.removeChild(holder);
    if(dlBtn)dlBtn.textContent=orig;
    if(dlBtnStep)dlBtnStep.textContent='&#8595; Download PDF';
  }
}

/* ================================================================
   IMPORT / EXPORT JSON
================================================================ */
function exportJSON(){
  const blob=new Blob([JSON.stringify(S.data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`${[S.data.personal.firstName,S.data.personal.lastName].filter(Boolean).join('_')||'resume'}_brm.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Saved as JSON');
}

document.getElementById('exportBtn').addEventListener('click',exportJSON);
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('filein').click());
document.getElementById('filein').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(typeof data.personal==='object'){S.data={...fresh(),...data};save();renderAll();toast('Data imported');}
      else toast('Invalid file format','err');
    }catch{toast('Could not read file','err');}
  };
  reader.readAsText(file);
  e.target.value='';
});

/* ================================================================
   SETTINGS MODAL
================================================================ */
document.getElementById('settingsBtn').addEventListener('click',()=>{
  document.getElementById('apifld').value=S.apiKey;
  document.getElementById('setov').classList.add('show');
});
document.getElementById('cancelSet').addEventListener('click',()=>document.getElementById('setov').classList.remove('show'));
document.getElementById('saveSet').addEventListener('click',()=>{
  const k=document.getElementById('apifld').value.trim();
  S.apiKey=k;
  localStorage.setItem(AKEY,k);
  document.getElementById('setov').classList.remove('show');
  toast(k?'API key saved — AI features unlocked':'API key cleared');
  renderForm();
});
document.getElementById('setov').addEventListener('click',e=>{
  if(e.target===document.getElementById('setov'))document.getElementById('setov').classList.remove('show');
});

/* Header PDF button */
document.getElementById('dlBtn').addEventListener('click',downloadPDF);

/* ================================================================
   INIT
================================================================ */
function renderAll(){renderSteps();renderForm();renderPreview();}
renderAll();
</script>
